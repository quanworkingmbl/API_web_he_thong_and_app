# ============================================================
# Cloud Build — CI/CD Pipeline
# Tự động: Build Docker → Push Artifact Registry → Deploy Cloud Run
# Trigger: mỗi lần git push lên branch 'main'
# ============================================================

substitutions:
  _REGION: asia-southeast1
  _REPO: mbl-cms-repo
  _SERVICE: api-web-he-thong-and-app   # Tên Cloud Run service (phải khớp với service đang chạy)
  _PROJECT: mbl-cms-backend-2026       # Project chính chứa Cloud SQL + Cloud Run
  _CLOUDSQL_INSTANCE: mbl-cms-backend-2026:asia-southeast1:mbl-cms-db  # Cloud SQL connection name

steps:
  # ── Step 1: Build Docker image ──────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest'
      - '.'

  # ── Step 2: Push lên Artifact Registry ──────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}'

  # ── Step 3: Deploy lên Cloud Run ────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=120'
      # Chỉ inject secrets nhạy cảm — biến còn lại đọc từ default trong config.py
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest'

# Lưu image vào Artifact Registry sau khi build
images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest'

# Cấu hình log
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'  # Máy build (đủ dùng, tiết kiệm)

# Timeout cho toàn bộ pipeline (10 phút là đủ)
timeout: '600s'
