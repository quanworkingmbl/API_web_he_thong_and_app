substitutions:
  _REGION: asia-southeast1
  _REPO: mbl-cms-repo
  _SERVICE: api-web-he-thong-and-app
  _PROJECT: mbl-cms-backend-2026
  _CLOUDSQL_INSTANCE: mbl-cms-backend-2026:asia-southeast1:mbl-cms-db

steps:
  # ── Step 1: Build Docker image ───────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest'
      - '.'

  # ── Step 2: Push lên Artifact Registry ──────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}'

  # ── Step 3: Alembic migrate (chạy trong Cloud Build, KHÔNG chạy khi startup) ──
  # Dùng image vừa build để chạy alembic upgrade head trước khi deploy
  - name: '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
    id: 'Migrate'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'alembic upgrade head'
    env:
      - 'DATABASE_URL=$$DATABASE_URL'
    secretEnv:
      - 'DATABASE_URL'

  # ── Step 4: Deploy lên Cloud Run ────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--startup-cpu-boost'
      - '--add-cloudsql-instances=${_CLOUDSQL_INSTANCE}'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest'
      - '--set-env-vars=CORS_ORIGINS=http://localhost:3000,http://localhost:5173,https://quancmsbe.site,https://www.quancmsbe.site,https://api.quancmsbe.site,https://mbl-cms.store,https://www.mbl-cms.store'

availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT}/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'

timeout: '900s'
